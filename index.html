<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résidanat+</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a1c4b;--navy2:#252863;--blue:#3f51b5;--blue2:#303f9f;--blue-light:#e8eaf6;--blue-bg:#f0f4ff;
  --green:#4caf50;--green-bg:#e8f5e9;--red:#f44336;--red-bg:#ffebee;
  --orange:#ff9800;--orange-bg:#fff3e0;--yellow:#ffc107;
  --text:#1a1a2e;--muted:#9e9e9e;--border:#ebebf0;
  --card:#ffffff;--bg:#f5f6fa;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,.06);
  --sb:60px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;font-size:13px}

/* SIDEBAR */
.sb{width:var(--sb);background:var(--navy);display:flex;flex-direction:column;align-items:center;padding:14px 0;flex-shrink:0;z-index:100;height:100vh;position:fixed;left:0;top:0}
.sb-logo{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;margin-bottom:22px;cursor:pointer;flex-shrink:0}
.sb-items{display:flex;flex-direction:column;gap:4px;flex:1;width:100%;padding:0 6px;overflow:hidden}
.sb-bottom{display:flex;flex-direction:column;gap:4px;padding:0 6px;padding-bottom:8px}
.si{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.45);font-size:18px;transition:all .15s;position:relative;flex-shrink:0}
.si:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.si.active{background:var(--blue);color:#fff}
.notif-dot{position:absolute;top:6px;right:5px;background:#f44336;color:#fff;font-size:8px;font-weight:700;padding:1px 3px;border-radius:7px;min-width:14px;text-align:center;line-height:14px}

/* LAYOUT */
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}

/* TOP BAR */
.topbar{height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;gap:12px}
.topbar-title{font-size:16px;font-weight:800;white-space:nowrap}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;cursor:text;transition:border-color .15s}
.search-box:focus-within{border-color:var(--blue);background:#fff}
.search-box input{border:none;background:transparent;outline:none;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);width:100%}
.search-box input::placeholder{color:var(--muted)}
.search-icon{color:var(--muted);font-size:14px;flex-shrink:0}
.search-results{position:absolute;top:calc(100% + 6px);right:0;left:0;background:#fff;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;max-height:260px;overflow-y:auto}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--blue-bg)}
.sr-item .sr-name{font-size:13px;font-weight:600}
.sr-item .sr-meta{font-size:11px;color:var(--muted);margin-top:1px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 24px;min-height:0}

/* TYPOGRAPHY */
.page-title{font-size:20px;font-weight:800;margin-bottom:4px}
.title-line{width:36px;height:3px;background:var(--yellow);border-radius:2px;margin-bottom:18px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;margin-bottom:4px;flex-wrap:wrap}
.breadcrumb .sep{color:var(--muted);font-weight:400}
.bc-link{cursor:pointer;color:var(--text)}.bc-link:hover{color:var(--blue)}
.sec-title{font-size:16px;font-weight:700;color:var(--blue);margin:14px 0 12px}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:8px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.card-icon{font-size:26px;color:#757575;margin-bottom:8px}
.card-title{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:10px}
.card-footer{display:flex;align-items:center;gap:5px;font-size:11px;color:#757575;margin-bottom:5px}
.prog-bar{height:3px;background:#f0f0f5;border-radius:2px}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
.ygrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:8px}
.ycard{background:var(--card);border-radius:var(--radius);padding:18px 14px;cursor:pointer;transition:all .2s;border:1px solid var(--border);text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px}
.ycard:hover{box-shadow:var(--shadow)}
.ycard-icon{font-size:28px;color:#bdbdbd}
.ycard-name{font-size:14px;font-weight:600}
.ycard-foot{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}

/* SERIE DETAIL */
.serie-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.serie-grid{grid-template-columns:1fr}}
.info-box{background:var(--card);border-radius:var(--radius);padding:20px}
.serie-src{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:10px}
.meta-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:5px;font-size:13px;color:#616161}
.actions-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;transition:all .15s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:var(--blue2)}
.btn-s{background:#fff8e1;color:#e65100;border:1px solid #ffe082}
.btn-b{background:#fff3e0;color:#e65100;border:1px solid #ffe0b2}
.att-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:8px}
.att-row{background:#f8f9fa;border-radius:8px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:#616161;margin-bottom:6px}
.illus{background:linear-gradient(135deg,#e8eaf6,#f3e5f5);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;min-height:180px}
.illus-text{font-size:22px;font-weight:800;color:var(--text);text-align:center;padding:20px;line-height:1.3}
.illus-text span{color:var(--blue)}

/* QCM */
.qcm-page{display:flex;flex-direction:column;height:100%;overflow:hidden}
.qtop{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.qtop-l .qsname{font-size:14px;font-weight:700}
.qtop-l .qsbread{font-size:11px;color:var(--muted);margin-top:1px}
.qtop-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qbadge{background:var(--blue);color:#fff;padding:6px 10px;border-radius:9px;font-size:13px;font-weight:700;white-space:nowrap}
.qtimer{background:var(--blue-light);color:var(--blue);padding:6px 10px;border-radius:9px;font-size:13px;font-weight:600;white-space:nowrap}
.qiconbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#757575;flex-shrink:0}
.qiconbtn:hover{background:#f5f5f5}
.qbody{display:flex;flex:1;overflow:hidden;min-height:0}
.qmain{flex:1;padding:16px 20px;overflow-y:auto;min-width:0}
.qside{width:260px;flex-shrink:0;border-left:1px solid var(--border);background:#fff;display:flex;flex-direction:column;overflow:hidden}
.side-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:10px 6px;border:none;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;border-bottom:2px solid transparent}
.stab.active{color:var(--blue);border-bottom-color:var(--blue)}
.stab-content{flex:1;overflow-y:auto;padding:12px}
.side-panel{display:none}.side-panel.active{display:block}
.prog-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px}
.prog-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.pb{width:100%;aspect-ratio:1;border-radius:8px;border:1.5px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.pb:hover{border-color:var(--blue);color:var(--blue)}
.pb.cur{border:2px solid var(--blue);color:var(--blue);background:var(--blue-bg)}
.pb.done{background:#f5f5f5;border-color:#bdbdbd;color:#757575}

/* COMMENTS */
.comments-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.comment{background:#f8f9fa;border-radius:8px;padding:9px 10px;font-size:12px}
.comment-hd{display:flex;justify-content:space-between;margin-bottom:4px}
.comment-user{font-weight:700;color:var(--blue)}
.comment-date{color:var(--muted);font-size:10px}
.comment-text{line-height:1.5;color:#424242}
.comment-reply{font-size:11px;color:var(--blue);cursor:pointer;margin-top:3px;display:inline-block}
.replies{margin-top:6px;padding-left:10px;border-left:2px solid var(--blue-light);display:flex;flex-direction:column;gap:6px}
.reply{background:#fff;border-radius:7px;padding:7px 9px;font-size:11px;border:1px solid var(--border)}
.reply-hd{display:flex;justify-content:space-between;margin-bottom:3px}
.reply-user{font-weight:700;color:var(--navy2)}
.new-comment{display:flex;flex-direction:column;gap:6px}
.new-comment textarea{border:1.5px solid var(--border);border-radius:8px;padding:7px 9px;font-family:'Inter',sans-serif;font-size:12px;resize:none;outline:none;min-height:58px;transition:border-color .15s}
.new-comment textarea:focus{border-color:var(--blue)}
.send-btn{align-self:flex-end;background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.send-btn:hover{background:var(--blue2)}
.no-comments{text-align:center;color:var(--muted);font-size:12px;padding:16px 0}
.reply-form{display:none;flex-direction:column;gap:4px;margin-top:5px}
.reply-form textarea{border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-family:'Inter',sans-serif;font-size:11px;resize:none;outline:none;min-height:42px}
.reply-form .send-btn{font-size:11px;padding:4px 10px}
.reply-form.show{display:flex}

/* QCM QUESTIONS */
.qbox{background:var(--blue-bg);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:14px;line-height:1.6;position:relative}
.qbox-info{position:absolute;top:10px;right:10px;background:#fff;border:1px solid var(--blue-light);border-radius:7px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue);cursor:pointer}
.cas-box{background:#fff8e1;border-left:4px solid var(--yellow);border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:14px;font-size:13px;line-height:1.6}
.cas-label{font-size:10px;font-weight:700;color:#f57c00;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.ch{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.ch:not(.locked):hover{border-color:var(--blue);background:var(--blue-bg)}
.ch.sel{border-color:var(--blue);background:var(--blue-bg)}
.ch.correct{border-color:var(--green);background:var(--green-bg)}
.ch.wrong{border-color:var(--red);background:var(--red-bg)}
.ch.missed{border-color:var(--orange);background:var(--orange-bg)}
.ch.locked{cursor:default}
.chltr{min-width:24px;height:24px;border-radius:6px;background:#f0f4ff;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;transition:all .15s}
.ch.sel .chltr{background:var(--blue);color:#fff}
.ch.correct .chltr{background:var(--green);color:#fff}
.ch.wrong .chltr{background:var(--red);color:#fff}
.ch.missed .chltr{background:var(--orange);color:#fff}
.ch-content{flex:1}
.ch-text{font-size:13px;line-height:1.4}
.ch-expl{font-size:12px;color:#424242;margin-top:6px;background:rgba(255,255,255,.7);border-radius:5px;padding:6px 8px;line-height:1.5}
.ch-pct{font-size:11px;font-weight:700;color:var(--blue);background:#fff;border:1.5px solid var(--blue-light);border-radius:20px;padding:2px 7px;align-self:center;flex-shrink:0}
.ch.correct .ch-pct{color:var(--green);border-color:#c8e6c9}
.ch.wrong .ch-pct{color:var(--red);border-color:#ffcdd2}
.ch.missed .ch-pct{color:#e65100;border-color:#ffe0b2}
.verify-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.verify-btn:hover{background:var(--blue2)}
.verify-btn:disabled{background:#e0e0e0;color:var(--muted);cursor:default}
.qbot{padding:12px 20px;display:flex;justify-content:space-between;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
.btn-nav{padding:10px 22px;border-radius:10px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;transition:all .15s}
.btn-nav-sec{background:#f0f4ff;color:var(--muted)}
.btn-nav-sec:not(:disabled):hover{background:var(--blue-light);color:var(--blue)}
.btn-nav-pri{background:var(--blue);color:#fff}.btn-nav-pri:hover{background:var(--blue2)}
.btn-nav:disabled{opacity:.4;cursor:default}

/* ADMIN */
.asec{background:#fff;border-radius:var(--radius);padding:18px;margin-bottom:12px;border:1px solid var(--border)}
.atitle{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:14px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.fgrid{grid-template-columns:1fr}}
.fgrid .full{grid-column:1/-1}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .15s;background:#fafafa}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);background:#fff}
.field textarea{resize:vertical;min-height:64px}
.ci-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ci-row{display:flex;align-items:center;gap:7px}
.ci-row span{font-size:11px;font-weight:700;color:var(--muted);min-width:16px}
.correct-cbs{display:flex;gap:8px;flex-wrap:wrap}
.ccb{display:flex;align-items:center;gap:4px;padding:5px 10px;border:1.5px solid #e0e0e0;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600}
.ccb input{accent-color:var(--blue);width:13px;height:13px;cursor:pointer}
.ccb:has(input:checked){border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.fa{display:flex;justify-content:flex-end;gap:8px;margin-top:4px;grid-column:1/-1}
.btn-save{background:var(--blue);color:#fff;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:13px}
.btn-cancel{background:#fff;color:var(--muted);padding:8px 14px;border-radius:8px;border:1.5px solid #e0e0e0;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:13px}
.cas-sq{background:#f8f9fa;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid #e0e0e0}
.sq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;font-weight:600;color:#424242}
.btn-add-sub{background:var(--blue-bg);color:var(--blue);padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;margin-top:6px}
.btn-del{background:var(--red-bg);color:var(--red);padding:4px 8px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600}
.stats-g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
@media(max-width:500px){.stats-g{grid-template-columns:repeat(2,1fr)}}
.stat-c{background:#fff;border-radius:var(--radius);padding:14px;text-align:center;border:1px solid var(--border)}
.stat-n{font-size:22px;font-weight:800;color:var(--blue)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

/* ACCUEIL */
.welcome{background:linear-gradient(135deg,var(--blue),#5c6bc0);border-radius:var(--radius);padding:22px;color:#fff;margin-bottom:18px}
.welcome h2{font-size:18px;font-weight:800;margin-bottom:4px}
.welcome p{font-size:13px;opacity:.85}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
@media(max-width:500px){.kpis{grid-template-columns:1fr}}
.kpi{background:#fff;border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.kpi-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.kpi-icon.teal{background:#e0f7fa;color:#00796b}
.kpi-icon.green{background:#e8f5e9;color:#2e7d32}
.kpi-icon.blue{background:var(--blue-bg);color:var(--blue)}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.kpi-val{font-size:16px;font-weight:800}
.prog-section{background:#fff;border-radius:var(--radius);padding:18px;border:1px solid var(--border);margin-bottom:16px}
.prog-sec-title{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:12px}
.prog-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.prog-row:last-child{border-bottom:none}
.prog-row:hover{background:#fafafa;border-radius:8px;padding-left:4px}
.prog-row-icon{font-size:20px}
.prog-row-info{flex:1}
.prog-row-name{font-size:13px;font-weight:600}
.prog-row-n{font-size:11px;color:var(--muted)}
.updates-section{background:#fff;border-radius:var(--radius);padding:18px;border:1px solid var(--border)}
.upd-title{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:12px}
.upd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.upd-card{border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
.upd-card:hover{border-color:var(--blue);background:var(--blue-bg)}
.upd-icon{font-size:22px;color:#bdbdbd;margin-bottom:6px}
.upd-name{font-size:13px;font-weight:600}
.upd-meta{font-size:11px;color:var(--muted);margin-top:2px}

/* COMING SOON */
.cs{text-align:center;padding:50px 20px}
.cs .big{font-size:44px;margin-bottom:12px}
.cs h2{font-size:18px;font-weight:700;margin-bottom:6px}
.cs p{color:var(--muted);font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:var(--blue);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.hidden{display:none!important}

/* RESPONSIVE */
@media(max-width:768px){
  :root{--sb:52px}
  .qside{width:200px}
  .prog-grid{grid-template-columns:repeat(5,1fr)}
  .content{padding:14px}
  .qtop-r .qtimer{display:none}
}
@media(max-width:480px){
  .qside{display:none}
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:3px}
</style>
</head>
<body>

<!-- SIDEBAR -->

supabaseClient.from = (function (originalFrom) {
  return function (table) {
    console.log('📦 supabase.from(' + table + ')');
    const builder = originalFrom.call(this, table);
    const origUpsert = builder.upsert;
    builder.upsert = function (...args) {
      console.log('📤 upsert args:', args);

    const origInsert = builder.insert;
    builder.insert = function (...args) {

// ── CHARGEMENT DE LA DATABASE ──
async function loadDB() {
  try {
    const [specsRes, sujetsRes, seriesRes, questionsRes, progressRes, attemptsRes, commentsRes] = await Promise.all([
      supabaseClient.from('specs').select('*'),
      supabaseClient.from('sujets').select('*'),
      supabaseClient.from('series').select('*'),
      supabaseClient.from('questions').select('*'),
      supabaseClient.from('progress').select('*').eq('user_id', userId),
      supabaseClient.from('attempts').select('*').eq('user_id', userId).order('date', { ascending: false }),
      supabaseClient.from('comments').select('*').order('date', { ascending: true })
    ]);

    db.specs = specsRes.data || [];
    if (db.specs.length === 0) {
      // Fallback : insérer les spécialités par défaut
      await supabaseClient.from('specs').upsert(SPECS_DEFAULT);
      db.specs = [...SPECS_DEFAULT];
    }

    db.sujets = (sujetsRes.data || []).map(s => ({ id: s.id, specId: s.spec_id, name: s.name }));
    db.series = (seriesRes.data || []).map(s => ({ id: s.id, sujetId: s.sujet_id, source: s.source, year: s.year }));
    db.questions = (questionsRes.data || []).map(q => ({
      id: q.id,
      serieId: q.serie_id,
      type: q.type,
      enonce: q.enonce,
      vignette: q.vignette,
      choices: q.choices,
      correct: q.correct,
      subs: q.subs
    }));

    db.progress = {};
    (progressRes.data || []).forEach(p => {
      if (!db.progress[p.question_id]) db.progress[p.question_id] = {};
      db.progress[p.question_id].done = p.done;
    });

    db.attempts = (attemptsRes.data || []).map(a => ({
      serieId: a.serie_id,
      progress: a.progress,
      score: a.score,
      dur: a.dur,
      date: a.date
    }));

    db.comments = {};
    (commentsRes.data || []).forEach(c => {
      const qid = c.question_id;
      if (!db.comments[qid]) db.comments[qid] = [];
      if (!c.parent_id) {
        db.comments[qid].push({
          _dbId: c.id,
          user: c.user_name,
          text: c.text,
          date: new Date(c.date).getTime(),
          replies: []
        });
      } else {
        for (const parent of (db.comments[qid] || [])) {
          if (parent._dbId === c.parent_id) {
            parent.replies.push({
              user: c.user_name,
              text: c.text,
              date: new Date(c.date).getTime()
            });
            break;
          }
        }
      }
    });

    return true;
  } catch (err) {
    console.error('Erreur chargement Supabase :', err);
    return false;
  }
}

  await supabaseClient.from('progress').upsert({
    user_id: userId,
    question_id: qid,
    done: done

}

async function saveAttempt(attempt) {
  await supabaseClient.from('attempts').insert({
    user_id: userId,
    serie_id: attempt.serieId,
    progress: attempt.progress,
    score: attempt.score,
    dur: attempt.dur,
    date: new Date().toISOString()
  });
}

async function saveComment(questionId, comment) {
  const { data } = await supabaseClient.from('comments').insert({
    question_id: questionId,
    user_name: comment.user,
    text: comment.text,
    date: new Date().toISOString(),
    parent_id: null
  }).select('id').single();
  if (data && db.comments[questionId]) {
    const last = db.comments[questionId][db.comments[questionId].length - 1];
    if (last) last._dbId = data.id;
  }
}

async function saveReply(questionId, parentIndex, reply) {
  const parent = db.comments[questionId]?.[parentIndex];
  if (!parent?._dbId) {
    await supabaseClient.from('comments').insert({
      question_id: questionId,
      user_name: reply.user,
      text: reply.text,
      date: new Date().toISOString(),
      parent_id: null
    });
    return;
  }
  await supabaseClient.from('comments').insert({
    question_id: questionId,
    user_name: reply.user,
    text: reply.text,
    date: new Date().toISOString(),
    parent_id: parent._dbId
  });
}

/* ── SEARCH ── */
function onSearch(val){
  const res = document.getElementById('search-res');
  if(!val.trim()){ res.classList.add('hidden'); return; }
  const q = val.toLowerCase();
  const hits = [];
  db.sujets.forEach(sj => {
    if(sj.name.toLowerCase().includes(q)){
      const sp = db.specs.find(s=>s.id===sj.specId);
      hits.push({type:'sujet', id:sj.id, name:sj.name, meta:sp?.name||''});
    }
  });
  db.series.forEach(sr => {
    const label = `${sr.source} ${sr.year}`;
    if(label.toLowerCase().includes(q)){
      const sj = db.sujets.find(s=>s.id===sr.sujetId);
      const sp = db.specs.find(s=>s.id===sj?.specId);
      hits.push({type:'serie', id:sr.id, name:label, meta:`${sp?.name||''} › ${sj?.name||''}`});
    }
  });
  if(!hits.length){
    res.innerHTML='<div style="padding:12px 14px;color:var(--muted);font-size:12px">Aucun résultat</div>';
    res.classList.remove('hidden'); return;
  }
  res.innerHTML = hits.slice(0,8).map(h =>
    `<div class="sr-item" onclick="searchGo('${h.type}','${h.id}')">
      <div class="sr-name">${h.name}</div>
      <div class="sr-meta">${h.meta}</div>
    </div>`).join('');
  res.classList.remove('hidden');
}
function showSearchRes(){ if(document.getElementById('search-inp').value.trim()) document.getElementById('search-res').classList.remove('hidden'); }
function searchGo(type, id){
  document.getElementById('search-res').classList.add('hidden');
  document.getElementById('search-inp').value = '';
  if(type==='sujet') go('sujet',{sujetId:id});
  else go('sdetail',{serieId:id});
}
document.addEventListener('click', e => {

});

async function rPlaylist() {
  const { data } = await supabaseClient
    .from('bookmarks')
    .select('question_id')
    .eq('user_id', userId);

  if (!data || !data.length) {
    return `<div class="cs"><div class="big">🎵</div><h2>Playlist vide</h2><p>Marquez des questions en cliquant sur 🔖 pendant une série.</p></div>`;
  }

  const qids = data.map(b => b.question_id);
  // Récupérer les questions
  const { data: questions } = await supabaseClient
    .from('questions')
    .select('*')
    .in('id', qids);

  let html = '<div class="page-title">Playlist</div><div class="title-line"></div>';
  if (!questions || !questions.length) return html + '<p>Aucune question trouvée.</p>';

  html += '<div style="display:flex;flex-direction:column;gap:8px">';
  for (const q of questions) {
    // Trouver la série pour avoir le breadcrumb
    const serie = db.series.find(s => s.id === q.serie_id);
    const sujet = serie ? db.sujets.find(s => s.id === serie.sujet_id) : null;
    const spec = sujet ? db.specs.find(s => s.id === sujet.spec_id) : null;
    const bread = `${spec?.name || '?'} / ${sujet?.name || '?'} / ${serie?.source || '?'} ${serie?.year || '?'}`;

    html += `<div style="background:var(--card);border-radius:var(--radius);padding:12px;border:1px solid var(--border);cursor:pointer" onclick="startBookmarkSerie('${q.serie_id}','${q.id}')">
      <div style="font-size:12px;color:var(--muted)">${bread}</div>
      <div style="margin-top:4px">${(q.enonce || q.vignette || '').substring(0,120)}...</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function startBookmarkSerie(sid, qid) {
  // Lancer la série mais sauter à la question marquée
  const sr = db.series.find(s => s.id === sid);
  if (!sr) return;
  const qs = qsOfSerie(sid);
  if (!qs.length) return;
  let idx = qs.findIndex(q => q.id === qid);
  if (idx === -1) idx = 0;
  timerSec = 0;
  const sj = db.sujets.find(s => s.id === sr.sujetId);
  const sp = db.specs.find(s => s.id === sj?.specId);
  S.session = {
    sid,
    name: `${sr.source} ${sr.year}`,
    bread: `${sp?.name || ''} / ${sj?.name || ''}`,
    qs,
    idx,
    sel: {},
    rev: {}
  };
  S.sideTab = 'prog';
  go('qcm');
}

    h += `<div class="sec-title">${j.name}</div><div class="grid">`;
    for(const sp of specs){
      const sjs = db.sujets.filter(s=>s.specId===sp.id);
      const qs = db.questions.filter(q=>{const sr=db.series.find(s=>s.id===q.serieId);if(!sr)return;const sj=db.sujets.find(s=>s.id===sr.sujetId);return sj?.specId===sp.id;});
      const an = answered(qs); const p = pct(an,qs.length);
      h += `<div class="card" onclick="go('spec',{specId:'${sp.id}'})">
        <div class="card-icon">📁</div>
        <div class="card-title">${sp.name}</div>
        <div class="card-sub">${sjs.length} sujet${sjs.length!==1?'s':''}</div>
        <div class="card-footer">🃏 ${an} / ${qs.length}</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div>
      </div>`;
    }
    h += '</div>';
  }
  return h;
}

/* ── START SESSION ── */
async function startSerie(sid){
  const sr = db.series.find(s=>s.id===sid);
  const sj = db.sujets.find(s=>s.id===sr?.sujetId);
  const sp = db.specs.find(s=>s.id===sj?.specId);
  const qs = qsOfSerie(sid);
  const qids = qs.map(q => q.id);
  const { data: statsData } = await supabaseClient
    .from('answers')
    .select('question_id, choices')
    .in('question_id', qids);
  // Construire un objet stats : { [qid]: { A: 12, B: 8, ... } }
  const stats = {};
  (statsData || []).forEach(row => {
    if (!stats[row.question_id]) stats[row.question_id] = {};
    row.choices.forEach(choice => {
      stats[row.question_id][choice] = (stats[row.question_id][choice] || 0) + 1;
    });
  });
  S.session = { ...S.session, stats };
  if(!qs.length){ toast('⚠️ Aucune question dans cette série'); return; }
  let idx = qs.findIndex(q=>!db.progress[q.id]?.done); if(idx===-1) idx=0;
  timerSec = 0;
  S.session = {sid, name:`${sr.source} ${sr.year}`, bread:`${sp?.name||''} / ${sj?.name||''}`, qs, idx, sel:{}, rev:{}};
  S.sideTab = 'prog';
  go('qcm');
}

function buildQ(q, rev, sel, tpl, stats = {}){
  const total = Object.values(stats).reduce((a,b)=>a+b,0) || 1;
  const calcPct = (letter) => total ? Math.round((stats[letter] || 0) / total * 100) : 0;
  // ... remplacer rp[ch.letter] par calcPct(ch.letter) dans l'affichage du badge de pourcentage ...
}

function tCh(qid,l){ const s=S.session; if(!s)return; if(!s.sel[qid])s.sel[qid]=[]; const i=s.sel[qid].indexOf(l); i===-1?s.sel[qid].push(l):s.sel[qid].splice(i,1); renderQCM(document.getElementById('qcm-area')); }
function tCC(qid,si,l){ const s=S.session; if(!s)return; if(!s.sel[qid])s.sel[qid]=[]; if(!s.sel[qid][si])s.sel[qid][si]=[]; const i=s.sel[qid][si].indexOf(l); i===-1?s.sel[qid][si].push(l):s.sel[qid][si].splice(i,1); renderQCM(document.getElementById('qcm-area')); }

async function revealQ(qid){
  const s = S.session; if (!s) return;
  s.rev[qid] = true;
  db.progress[qid] = {done: true};
  await saveProgress(qid);

  // Enregistrer les choix de l'utilisateur
  const q = s.qs.find(q => q.id === qid);
  if (q) {
    const userChoices = s.sel[qid] || [];
    const correctAnswers = q.correct || [];
    const isCorrect = arraysEqual(userChoices.sort(), correctAnswers.sort());
    await supabaseClient.from('answers').insert({
      question_id: qid,
      user_id: userId,
      choices: userChoices,
      is_correct: isCorrect
    });
  }

  renderQCM(document.getElementById('qcm-area'));
}

function nextQ(){ const s=S.session; if(!s)return; if(s.idx<s.qs.length-1){ s.idx++; renderQCM(document.getElementById('qcm-area')); } else finishSerie(); }
function prevQ(){ const s=S.session; if(!s)return; if(s.idx>0){ s.idx--; renderQCM(document.getElementById('qcm-area')); } }
function jumpTo(i){ S.session.idx=i; renderQCM(document.getElementById('qcm-area')); }
function exitQCM(){ if(timerIv){clearInterval(timerIv);timerIv=null;} go('sdetail',{serieId:S.session.sid}); }

async function finishSerie(){
  const s = S.session;
  const qs = s.qs;
  let correctCount = 0;
  const totalQuestions = qs.length;

  for (const q of qs) {
    if (!s.rev[q.id]) continue;
    const userSel = s.sel[q.id] || [];
    const trueAns = q.correct || [];
    if (arraysEqual(userSel.slice().sort(), trueAns.slice().sort())) {
      correctCount++;
    }
  }

  const an = qs.filter(q => s.rev[q.id]).length;
  const scorePercent = totalQuestions > 0 ? Math.round((correctCount / totalQuestions) * 100) : 0;

  const attempt = {
    serieId: s.sid,
    progress: an + '/' + totalQuestions,
    score: scorePercent,
    dur: timerSec
  };
  db.attempts.unshift(attempt);
  await saveAttempt(attempt);
  if (timerIv) { clearInterval(timerIv); timerIv = null; }
  go('sdetail', {serieId: s.sid});
  toast('✅ Série terminée ! Score : ' + scorePercent + '%');
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

    <div class="field full"><label>Explication (opt)</label><textarea id="sq-x-${i}" placeholder="..."></textarea></div>
  </div>`;
  document.getElementById('cas-sqs-list').appendChild(d);
}

async function addQuestion(){
  // Récupération des valeurs
  const sid = document.getElementById('aq-serie')?.value;
  const type = document.getElementById('aq-type')?.value;

  if (!sid) {
    toast('⚠️ Sélectionnez une série');
    return;
  }

  // Vérification que la série existe dans db.series (actualisé au chargement)
  const serieExiste = db.series.some(s => s.id === sid);
  if (!serieExiste) {
    toast('❌ Série introuvable. Retournez à l\'accueil puis revenez dans Admin pour actualiser la liste.');
    return;
  }

  if (type === 'qcm') {
    // --- QCM classique ---
    const enonce = document.getElementById('aq-enonce')?.value?.trim();
    if (!enonce) {
      toast('⚠️ Entrez un énoncé');
      return;
    }

    const letters = ['a', 'b', 'c', 'd', 'e'];
    const choices = letters.map(l => ({
      letter: l.toUpperCase(),
      text: document.getElementById('aq-c' + l)?.value?.trim() || '',
      expl: ''
    })).filter(c => c.text);

    if (choices.length < 2) {
      toast('⚠️ Minimum 2 choix');
      return;
    }

    const correct = [...document.querySelectorAll('input[name="qcorr"]:checked')].map(e => e.value);
    if (!correct.length) {
      toast('⚠️ Cochez la bonne réponse');
      return;
    }

    const expl = document.getElementById('aq-expl')?.value?.trim() || '';
    if (expl) {
      const firstCorrectChoice = choices.find(c => c.letter === correct[0]);
      if (firstCorrectChoice) firstCorrectChoice.expl = expl;
    }

    const newId = 'q' + uid();
    const newQuestion = {
      id: newId,
      serieId: sid,
      type: 'qcm',
      enonce: enonce,
      choices: choices,
      correct: correct
    };

    // Sauvegarde locale
    db.questions.push(newQuestion);

    // Sauvegarde Supabase
    const { error } = await supabaseClient.from('questions').upsert({
      id: newQuestion.id,
      serie_id: newQuestion.serieId,
      type: newQuestion.type,
      enonce: newQuestion.enonce,
      vignette: null,
      choices: newQuestion.choices,
      correct: newQuestion.correct,
      subs: null
    });

    if (error) {
      console.error('❌ Erreur Supabase :', error);
      toast('❌ Erreur : ' + error.message);
      db.questions.pop(); // retire la question locale en cas d'échec
      return;
    }
  } else if (type === 'cas') {
    // --- Cas clinique ---
    const vignette = document.getElementById('aq-vignette')?.value?.trim();
    if (!vignette) {
      toast('⚠️ Entrez la vignette clinique');
      return;
    }

    const subs = [];
    const subElements = document.querySelectorAll('[id^="sq-e-"]');
    subElements.forEach(el => {
      const i = el.id.replace('sq-e-', '');
      const subEnonce = el.value?.trim();
      if (!subEnonce) return;

      const subChoices = ['a','b','c','d','e'].map(l => ({
        letter: l.toUpperCase(),
        text: document.getElementById(`sq-c${l}-${i}`)?.value?.trim() || '',
        expl: document.getElementById(`sq-x-${i}`)?.value?.trim() || ''
      })).filter(c => c.text);

      const subCorrect = [...document.querySelectorAll(`input[name="sqcorr-${i}"]:checked`)].map(e => e.value);
      if (subChoices.length && subCorrect.length) {
        subs.push({ enonce: subEnonce, choices: subChoices, correct: subCorrect });
      }
    });

    if (subs.length === 0) {
      toast('⚠️ Ajoutez au moins une sous-question avec une bonne réponse');
      return;
    }

    const newId = 'q' + uid();
    const newQuestion = {
      id: newId,
      serieId: sid,
      type: 'cas',
      vignette: vignette,
      subs: subs
    };

    db.questions.push(newQuestion);

    const { error } = await supabaseClient.from('questions').upsert({
      id: newQuestion.id,
      serie_id: newQuestion.serieId,
      type: newQuestion.type,
      enonce: null,
      vignette: newQuestion.vignette,
      choices: null,
      correct: [],
      subs: newQuestion.subs
    });

    if (error) {
      console.error('❌ Erreur Supabase :', error);
      toast('❌ Erreur : ' + error.message);
      db.questions.pop();
      return;
    }
  } else {
    toast('⚠️ Type de question inconnu');
    return;
  }

  toast('✅ Question enregistrée !');
  go('admin');
}
function loadQuestionsForEdit(){
  const sid = document.getElementById('eq-serie')?.value;
  const sel = document.getElementById('eq-question');
  if (!sid || !sel) return;
  const qs = db.questions.filter(q => q.serieId === sid);
  sel.innerHTML = '<option value="">— Sélectionnez —</option>' +
    qs.map((q, i) => `<option value="${q.id}">Q${i+1} : ${(q.enonce||q.vignette||'').substring(0,60)}...</option>`).join('');
  document.getElementById('eq-edit-form')?.classList.add('hidden');
}

function editQuestion(){
  const qid = document.getElementById('eq-question')?.value;
  if (!qid) { toast('⚠️ Sélectionnez une question'); return; }
  const q = db.questions.find(q => q.id === qid);
  if (!q) return;
  document.getElementById('eq-enonce').value = q.enonce || q.vignette || '';
  const letters = ['a','b','c','d','e'];
  letters.forEach((l, i) => {
    const inp = document.getElementById('eq-c'+l);
    if (inp) inp.value = q.choices?.[i]?.text || '';
  });
  document.querySelectorAll('input[name="eqcorr"]').forEach(cb => {
    cb.checked = q.correct?.includes(cb.value) || false;
  });
  document.getElementById('eq-expl').value = q.choices?.find(c => q.correct?.includes(c.letter))?.expl || '';
  document.getElementById('eq-edit-form')?.classList.remove('hidden');
  document.getElementById('eq-edit-form').dataset.qid = qid;
}

async function saveEditedQuestion(){
  const qid = document.getElementById('eq-edit-form')?.dataset.qid;
  if (!qid) return;
  const enonce = document.getElementById('eq-enonce')?.value?.trim();
  if (!enonce) { toast('⚠️ Entrez un énoncé'); return; }
  const letters = ['a','b','c','d','e'];
  const choices = letters.map(l => ({
    letter: l.toUpperCase(),
    text: document.getElementById('eq-c'+l)?.value?.trim() || '',
    expl: ''
  })).filter(c => c.text);
  const correct = [...document.querySelectorAll('input[name="eqcorr"]:checked')].map(e => e.value);
  if (!correct.length) { toast('⚠️ Cochez la bonne réponse'); return; }
  const expl = document.getElementById('eq-expl')?.value?.trim();
  if (expl) {
    const firstCorrect = choices.find(c => c.letter === correct[0]);
    if (firstCorrect) firstCorrect.expl = expl;
  }
  const q = db.questions.find(q => q.id === qid);
  if (q) {
    q.enonce = enonce;
    q.choices = choices;
    q.correct = correct;
    if (q.type === 'cas') q.vignette = enonce;
  }
  await supabaseClient.from('questions').update({ enonce, choices, correct }).eq('id', qid);
  toast('✅ Question modifiée !');
  document.getElementById('eq-edit-form')?.classList.add('hidden');
}

async function deleteSelectedQuestion(){
  const qid = document.getElementById('eq-question')?.value;
  if (!qid) { toast('⚠️ Sélectionnez une question'); return; }
  if (!confirm('Supprimer définitivement cette question ?')) return;
  await deleteQuestionFromDB(qid);
  db.questions = db.questions.filter(q => q.id !== qid);
  toast('🗑 Question supprimée');
  loadQuestionsForEdit();
  document.getElementById('eq-edit-form')?.classList.add('hidden');
}

  await go('series');
