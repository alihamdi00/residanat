<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résidanat+</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Barre latérale -->
<div class="sb">
  <div class="sb-logo" title="Accueil">+</div>
  <div class="sb-items">
    <div class="si active" data-page="accueil" title="Accueil">🏠</div>
    <div class="si" data-page="series" title="Séries">📚</div>
    <div class="si" data-page="examens" title="Examens blancs">📝</div>
    <div class="si" data-page="stats" title="Statistiques">📊</div>
  </div>
  <div class="sb-bottom">
    <div class="si" data-page="admin" title="Administration">⚙️</div>
    <!-- Icône Connexion (visible quand NON connecté) -->
    <div class="si" id="n-login" data-page="login" title="Connexion">🔑</div>
    <!-- Icône Profil (visible quand connecté) -->
    <div class="si hidden" id="n-profil" data-page="profil" title="Mon profil">👤</div>
    <div class="si" data-page="playlist" title="Playlist">🎵</div>
    <div class="si" data-page="abo" title="Abonnement">💎</div>
    <div class="si" data-page="notifications" title="Notifications">🔔<span class="notif-dot hidden" id="notif-badge">0</span></div>
  </div>
</div>

  <!-- Zone principale -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Chargement…</div>
      <span id="topbar-user" style="font-size:12px;color:var(--muted);margin-left:8px"></span>
      <div class="search-wrap">
        <div class="search-box" onclick="document.getElementById('search-inp').focus()">
          <span class="search-icon">🔍</span>
          <input id="search-inp" placeholder="Numéro / Nom du sujet" oninput="onSearch(this.value)" autocomplete="off"/>
        </div>
        <div class="search-results hidden" id="search-res"></div>
      </div>
    </div>
    <div class="content" id="content-area"></div>
    <div id="qcm-area" class="hidden" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0"></div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Scripts (ordre important) -->
<script src="js/config.js"></script>
<script src="js/helpers.js"></script>
<script src="js/supabase.js"></script>
<script src="js/router.js"></script>
<script src="js/admin.js"></script>
<script src="js/series.js"></script>
<script src="js/exams.js"></script>
<script src="js/stats.js"></script>
<script src="js/profile.js"></script>
<script src="js/notifications.js"></script>
<script src="js/login.js"></script>
<script src="js/auth-ui.js"></script>   <!-- Nouveau fichier -->
<script src="js/app.js"></script>
</body>
</html>
